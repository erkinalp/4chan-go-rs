# Test configuration for fixed-window rate limiter validation
lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

# DNS resolver for Docker network
resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name localhost;
    
    # Health check endpoint for testing
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Test rate limiting on API endpoints
    location /api/v1/test {
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            rate_limiter.check_rate_limit()
        }
        content_by_lua_block {
            ngx.header.content_type = "application/json"
            ngx.say('{"message": "API test endpoint", "timestamp": "' .. ngx.time() .. '"}')
        }
    }
    
    # Test rate limiting on auth endpoints
    location /api/v1/auth/test {
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            rate_limiter.check_rate_limit()
        }
        content_by_lua_block {
            ngx.header.content_type = "application/json"
            ngx.say('{"message": "Auth test endpoint", "timestamp": "' .. ngx.time() .. '"}')
        }
    }
    
    # Test rate limiting on file endpoints
    location /api/v1/files/test {
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            rate_limiter.check_rate_limit()
        }
        content_by_lua_block {
            ngx.header.content_type = "application/json"
            ngx.say('{"message": "Files test endpoint", "timestamp": "' .. ngx.time() .. '"}')
        }
    }
}
