# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=files_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=50r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# Custom log format for structured logging
log_format gateway_json escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"user_agent":"$http_user_agent",'
    '"x_forwarded_for":"$http_x_forwarded_for"'
'}';

# Upstream definitions for load balancing
upstream api_backend {
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream files_backend {
    server files:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream auth_backend {
    server auth:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream media_backend {
    server media-processor:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream frontend_backend {
    server frontend:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;
    
    # Request size limits
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Apply global connection limits
    limit_conn conn_limit_per_ip 10;
    
    # Logging
    access_log /var/log/nginx/gateway_access.log gateway_json;
    error_log /var/log/nginx/gateway_error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Metrics endpoint for Prometheus
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    location /metrics {
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        return 200 "# Nginx metrics available at /nginx_status\n";
        add_header Content-Type text/plain;
    }

    # Authentication endpoints
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req zone=global_limit burst=100 nodelay;
        
        proxy_pass http://auth_backend/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # File service endpoints
    location /api/v1/files/ {
        limit_req zone=files_limit burst=30 nodelay;
        limit_req zone=global_limit burst=100 nodelay;
        
        # JWT validation for protected endpoints
        set $auth_required 1;
        if ($request_uri ~* "^/api/v1/files/public/") {
            set $auth_required 0;
        }
        
        if ($auth_required = 1) {
            if ($http_authorization !~ "^Bearer .+") {
                return 401 '{"error": "Authorization required"}';
            }
        }
        
        proxy_pass http://files_backend/api/v1/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # File upload specific settings
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Media processor endpoints
    location /api/v1/media/ {
        limit_req zone=files_limit burst=20 nodelay;
        limit_req zone=global_limit burst=100 nodelay;
        
        # JWT validation required
        if ($http_authorization !~ "^Bearer .+") {
            return 401 '{"error": "Authorization required"}';
        }
        
        proxy_pass http://media_backend/api/v1/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Media processing specific settings
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API Core endpoints (boards, threads, posts, etc.)
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req zone=global_limit burst=100 nodelay;
        
        # Allow health endpoints without auth
        set $auth_required 1;
        if ($request_uri ~* "^/api/v1/health") {
            set $auth_required 0;
        }
        if ($request_uri ~* "^/api/v1/boards$") {
            set $auth_required 0;
        }
        
        if ($auth_required = 1) {
            if ($http_authorization !~ "^Bearer .+") {
                return 401 '{"error": "Authorization required"}';
            }
        }
        
        proxy_pass http://api_backend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend static files
    location / {
        proxy_pass http://frontend_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Catch-all for undefined API routes
    location ~* ^/api/ {
        return 404 '{"error": "API endpoint not found"}';
        add_header Content-Type application/json;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}

# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
