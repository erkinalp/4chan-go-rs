# Lua package path for custom modules
lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

# DNS resolver for Docker network
resolver 127.0.0.11 valid=30s ipv6=off;

# Shared dictionaries for Lua modules
lua_shared_dict circuit_breaker 10m;
lua_shared_dict auth_cache 10m;
lua_shared_dict prometheus_metrics 10m;

# Connection limiting (keep this for DoS protection)
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# Custom log format for structured logging with request ID and tracing
log_format gateway_json escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"correlation_id":"$http_x_correlation_id",'
    '"remote_addr":"$remote_addr",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"user_agent":"$http_user_agent",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"x_user_id":"$http_x_user_id",'
    '"x_user_role":"$http_x_user_role"'
'}';

# Upstream definitions for load balancing with enhanced health checks
upstream api_backend {
    least_conn;  # Use least connections algorithm for better distribution
    server api:3000 max_fails=3 fail_timeout=30s weight=1;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream files_backend {
    least_conn;
    server files:8080 max_fails=3 fail_timeout=30s weight=1;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream auth_backend {
    least_conn;
    server auth:3000 max_fails=3 fail_timeout=30s weight=1;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream media_backend {
    least_conn;
    server media-processor:8081 max_fails=3 fail_timeout=30s weight=1;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream frontend_backend {
    least_conn;
    server frontend:3000 max_fails=3 fail_timeout=30s weight=1;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# Initialize Lua modules on worker startup
init_worker_by_lua_block {
    -- Initialize random seed for request ID generation
    math.randomseed(ngx.now() * 1000 + ngx.worker.pid())
    
    -- Initialize metrics module
    local metrics = require "metrics"
    metrics.init()
}

server {
    listen 80;
    server_name localhost;
    
    # Request ID variable for tracing
    set $request_id $http_x_request_id;
    
    # Request size limits
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Apply global connection limits
    limit_conn conn_limit_per_ip 10;
    
    # Logging with request ID
    access_log /var/log/nginx/gateway_access.log gateway_json;
    error_log /var/log/nginx/gateway_error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Request-ID $request_id always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Metrics endpoint for Prometheus
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    location /metrics {
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        content_by_lua_block {
            local metrics = require "metrics"
            metrics.serve()
        }
    }

    # Circuit breaker status endpoint (internal only)
    location /internal/circuit-status {
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        content_by_lua_block {
            local circuit_breaker = require "circuit_breaker"
            local cjson = require "cjson"
            
            local services = {"api", "auth", "files", "media", "frontend"}
            local status = {}
            
            for _, service in ipairs(services) do
                status[service] = circuit_breaker.get_status(service)
            end
            
            ngx.header.content_type = "application/json"
            ngx.say(cjson.encode(status))
        }
    }

    # Authentication endpoints with rate limiting and circuit breaker
    location /api/v1/auth/ {
        # Set request ID for tracing
        set_by_lua_block $request_id {
            local request_id_mod = require "request_id"
            return request_id_mod.get_or_create_request_id()
        }
        
        # Apply rate limiting, circuit breaker check, and set tracing headers
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            local circuit_breaker = require "circuit_breaker"
            local request_id_mod = require "request_id"
            
            -- Set tracing headers
            request_id_mod.set_tracing_headers()
            
            -- Check circuit breaker
            if not circuit_breaker.check_circuit("auth") then
                circuit_breaker.reject_request("auth")
            end
            
            -- Apply rate limiting
            rate_limiter.check_rate_limit()
        }
        
        # Record circuit breaker result and metrics in log phase
        log_by_lua_block {
            local circuit_breaker = require "circuit_breaker"
            local request_id_mod = require "request_id"
            local metrics = require "metrics"
            
            -- Set response headers
            request_id_mod.set_response_headers()
            
            -- Record request metrics
            metrics.record_request()
            
            -- Record success/failure for circuit breaker
            local status = ngx.var.upstream_status
            if status then
                local status_num = tonumber(status)
                if status_num and status_num >= 500 then
                    circuit_breaker.record_failure("auth")
                else
                    circuit_breaker.record_success("auth")
                end
            end
        }
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to auth service
        proxy_pass http://auth_backend/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        
        # Standard timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Error handling for upstream failures
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # File upload endpoint with rate limiting, auth, and circuit breaker
    location /api/v1/files/ {
        # Set request ID for tracing
        set_by_lua_block $request_id {
            local request_id_mod = require "request_id"
            return request_id_mod.get_or_create_request_id()
        }
        
        # Apply rate limiting, auth, circuit breaker, and set tracing headers
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            local circuit_breaker = require "circuit_breaker"
            local gnap_auth = require "gnap_auth"
            local request_id_mod = require "request_id"
            
            -- Set tracing headers
            request_id_mod.set_tracing_headers()
            
            -- Check circuit breaker
            if not circuit_breaker.check_circuit("files") then
                circuit_breaker.reject_request("files")
            end
            
            -- Apply rate limiting
            rate_limiter.check_rate_limit()
            
            -- Check authentication (public files are handled in gnap_auth)
            gnap_auth.check_auth()
        }
        
        # Record circuit breaker result and metrics in log phase
        log_by_lua_block {
            local circuit_breaker = require "circuit_breaker"
            local request_id_mod = require "request_id"
            local metrics = require "metrics"
            
            request_id_mod.set_response_headers()
            metrics.record_request()
            
            local status = ngx.var.upstream_status
            if status then
                local status_num = tonumber(status)
                if status_num and status_num >= 500 then
                    circuit_breaker.record_failure("files")
                else
                    circuit_breaker.record_success("files")
                end
            end
        }
        
        # Increase body size for file uploads
        client_max_body_size 100M;
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to file service
        proxy_pass http://files_backend/api/v1/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        
        # Extended timeouts for file operations
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Error handling
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 30s;
    }

    # Media processing endpoint with rate limiting, auth, and circuit breaker
    location /api/v1/media/ {
        # Set request ID for tracing
        set_by_lua_block $request_id {
            local request_id_mod = require "request_id"
            return request_id_mod.get_or_create_request_id()
        }
        
        # Apply rate limiting, auth, circuit breaker, and set tracing headers
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            local circuit_breaker = require "circuit_breaker"
            local gnap_auth = require "gnap_auth"
            local request_id_mod = require "request_id"
            
            -- Set tracing headers
            request_id_mod.set_tracing_headers()
            
            -- Check circuit breaker
            if not circuit_breaker.check_circuit("media") then
                circuit_breaker.reject_request("media")
            end
            
            -- Apply rate limiting
            rate_limiter.check_rate_limit()
            
            -- Check authentication
            gnap_auth.check_auth()
        }
        
        # Record circuit breaker result and metrics in log phase
        log_by_lua_block {
            local circuit_breaker = require "circuit_breaker"
            local request_id_mod = require "request_id"
            local metrics = require "metrics"
            
            request_id_mod.set_response_headers()
            metrics.record_request()
            
            local status = ngx.var.upstream_status
            if status then
                local status_num = tonumber(status)
                if status_num and status_num >= 500 then
                    circuit_breaker.record_failure("media")
                else
                    circuit_breaker.record_success("media")
                end
            end
        }
        
        # Increase body size for media uploads
        client_max_body_size 100M;
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to media processor
        proxy_pass http://media_backend/api/v1/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        
        # Extended timeouts for media processing
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Error handling
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 60s;
    }

    # API Core endpoints with rate limiting, auth, and circuit breaker
    location /api/v1/ {
        # Set request ID for tracing
        set_by_lua_block $request_id {
            local request_id_mod = require "request_id"
            return request_id_mod.get_or_create_request_id()
        }
        
        # Apply rate limiting, auth, circuit breaker, and set tracing headers
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            local circuit_breaker = require "circuit_breaker"
            local gnap_auth = require "gnap_auth"
            local request_id_mod = require "request_id"
            
            -- Set tracing headers
            request_id_mod.set_tracing_headers()
            
            -- Check circuit breaker
            if not circuit_breaker.check_circuit("api") then
                circuit_breaker.reject_request("api")
            end
            
            -- Apply rate limiting
            rate_limiter.check_rate_limit()
            
            -- Check authentication (public endpoints handled in gnap_auth)
            gnap_auth.check_auth()
        }
        
        # Record circuit breaker result and metrics in log phase
        log_by_lua_block {
            local circuit_breaker = require "circuit_breaker"
            local request_id_mod = require "request_id"
            local metrics = require "metrics"
            
            request_id_mod.set_response_headers()
            metrics.record_request()
            
            local status = ngx.var.upstream_status
            if status then
                local status_num = tonumber(status)
                if status_num and status_num >= 500 then
                    circuit_breaker.record_failure("api")
                else
                    circuit_breaker.record_success("api")
                end
            end
        }
        
        # Add security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Request-ID $request_id always;
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to API service
        proxy_pass http://api_backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Error handling
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 15s;
    }

    # Frontend static files with circuit breaker
    location / {
        # Set request ID for tracing
        set_by_lua_block $request_id {
            local request_id_mod = require "request_id"
            return request_id_mod.get_or_create_request_id()
        }
        
        access_by_lua_block {
            local circuit_breaker = require "circuit_breaker"
            local request_id_mod = require "request_id"
            
            request_id_mod.set_tracing_headers()
            
            if not circuit_breaker.check_circuit("frontend") then
                circuit_breaker.reject_request("frontend")
            end
        }
        
        log_by_lua_block {
            local circuit_breaker = require "circuit_breaker"
            local request_id_mod = require "request_id"
            local metrics = require "metrics"
            
            request_id_mod.set_response_headers()
            metrics.record_request()
            
            local status = ngx.var.upstream_status
            if status then
                local status_num = tonumber(status)
                if status_num and status_num >= 500 then
                    circuit_breaker.record_failure("frontend")
                else
                    circuit_breaker.record_success("frontend")
                end
            end
        }
        
        proxy_pass http://frontend_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        
        # WebSocket support for development
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Error handling
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # Catch-all for undefined API routes
    location ~* ^/api/ {
        return 404 '{"error": "API endpoint not found"}';
        add_header Content-Type application/json;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}

# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
