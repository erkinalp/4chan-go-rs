# Lua package path for rate limiter
lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

# DNS resolver for Docker network
resolver 127.0.0.11 valid=30s;

# Fixed Window Rate Limiting with Redis
# Using custom Lua script for aggressive blocking behavior

# Connection limiting (keep this for DoS protection)
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# Custom log format for structured logging
log_format gateway_json escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"user_agent":"$http_user_agent",'
    '"x_forwarded_for":"$http_x_forwarded_for"'
'}';

# Upstream definitions for load balancing
upstream api_backend {
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream files_backend {
    server files:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream auth_backend {
    server auth:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream media_backend {
    server media-processor:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream frontend_backend {
    server frontend:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;
    
    # Request size limits
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Apply global connection limits
    limit_conn conn_limit_per_ip 10;
    
    # Logging
    access_log /var/log/nginx/gateway_access.log gateway_json;
    error_log /var/log/nginx/gateway_error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Metrics endpoint for Prometheus
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    location /metrics {
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        return 200 "# Nginx metrics available at /nginx_status\n";
        add_header Content-Type text/plain;
    }

    # Authentication endpoints with fixed-window rate limiting
    location /api/v1/auth/ {
        # Apply fixed-window rate limiting
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            rate_limiter.check_rate_limit()
        }
        
        # No JWT required for auth endpoints (login, register, etc.)
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to auth service
        proxy_pass http://auth_backend/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Standard timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # File upload endpoint with fixed-window rate limiting
    location /api/v1/files/ {
        # Apply fixed-window rate limiting
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            rate_limiter.check_rate_limit()
        }
        
        # JWT Authentication (except for public files)
        if ($request_uri !~ "^/api/v1/files/public/") {
            if ($http_authorization !~ "^Bearer .+") {
                return 401 '{"error": "Authorization required"}';
            }
        }
        
        # Increase body size for file uploads
        client_max_body_size 100M;
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to file service
        proxy_pass http://files_backend/api/v1/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Extended timeouts for file operations
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Media processing endpoint with fixed-window rate limiting
    location /api/v1/media/ {
        # Apply fixed-window rate limiting
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            rate_limiter.check_rate_limit()
        }
        
        # JWT Authentication required
        if ($http_authorization !~ "^Bearer .+") {
            return 401 '{"error": "Authorization required"}';
        }
        
        # Increase body size for media uploads
        client_max_body_size 100M;
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to media processor
        proxy_pass http://media_backend/api/v1/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Extended timeouts for media processing
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API Core endpoints with fixed-window rate limiting
    location /api/v1/ {
        # Apply fixed-window rate limiting
        access_by_lua_block {
            local rate_limiter = require "fixed_window_rate_limiter"
            rate_limiter.check_rate_limit()
        }
        
        # JWT Authentication for protected endpoints
        if ($request_uri !~ "^/api/v1/(health|boards)($|/)") {
            if ($http_authorization !~ "^Bearer .+") {
                return 401 '{"error": "Authorization required"}';
            }
        }
        
        # Add security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        
        # Connection limiting
        limit_conn conn_limit_per_ip 10;
        
        # Proxy to API service
        proxy_pass http://api_backend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend static files
    location / {
        proxy_pass http://frontend_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Catch-all for undefined API routes
    location ~* ^/api/ {
        return 404 '{"error": "API endpoint not found"}';
        add_header Content-Type application/json;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}

# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
