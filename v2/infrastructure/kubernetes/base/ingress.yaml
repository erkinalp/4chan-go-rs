apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 4chan-ingress
  namespace: 4chan-v2
  labels:
    app: 4chan-v2
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.4chan-v2.local
    - 4chan-v2.local
    secretName: 4chan-tls
  rules:
  - host: 4chan-v2.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.4chan-v2.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8080
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8081
      - path: /files
        pathType: Prefix
        backend:
          service:
            name: files-service
            port:
              number: 8082
