openapi: 3.1.0
info:
  title: 4chan v2 API
  version: 1.0.0
  description: |
    API moderna para 4chan v2 que proporciona acceso a funcionalidades de tablones, hilos, posts y sistemas de moderación.
  contact:
    name: Equipo de Desarrollo 4chan v2
    email: dev@example.com
  license:
    name: MIT
servers:
  - url: https://api.4chan-v2.example.com/api/v1
    description: Servidor de producción
  - url: https://staging-api.4chan-v2.example.com/api/v1
    description: Servidor de staging
  - url: http://localhost/api/v1
    description: Servidor de desarrollo local

tags:
  - name: auth
    description: Autenticación y gestión de usuarios
  - name: boards
    description: Gestión de tablones
  - name: threads
    description: Gestión de hilos
  - name: posts
    description: Gestión de posts
  - name: files
    description: Gestión de archivos
  - name: moderation
    description: Herramientas de moderación
  - name: captcha
    description: Sistema de CAPTCHA
  - name: health
    description: Estado del sistema

paths:
  /health:
    get:
      summary: Verificar estado del sistema
      description: Endpoint para comprobar si la API está funcionando correctamente
      tags:
        - health
      responses:
        '200':
          description: Sistema funcionando correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptime:
                    type: number
                    example: 1234567

  /auth/grant:
    post:
      summary: Solicitar autorización GNAP
      description: Inicia el flujo de autorización GNAP para obtener tokens de acceso
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GNAPGrantRequest'
      responses:
        '200':
          description: Solicitud de autorización procesada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GNAPGrantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/continue:
    post:
      summary: Continuar autorización GNAP
      description: Continúa el flujo de autorización GNAP después de la interacción del usuario
      tags:
        - auth
      security:
        - GNAPAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                interact_ref:
                  type: string
                  description: Referencia de interacción del usuario
      responses:
        '200':
          description: Continuación de autorización procesada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GNAPGrantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/introspect:
    post:
      summary: Introspección de token GNAP
      description: Valida y obtiene información sobre un token de acceso GNAP
      tags:
        - auth
      security:
        - GNAPAuth: []
      responses:
        '200':
          description: Token válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GNAPUserContext'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /boards:
    get:
      summary: Listar tablones
      description: Obtiene la lista de todos los tablones disponibles
      tags:
        - boards
      parameters:
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QueryOffset'
        - name: category
          in: query
          description: Filtrar por categoría
          schema:
            type: string
        - name: includeNsfw
          in: query
          description: Incluir tablones NSFW en resultados
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Lista de tablones
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Board'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /boards/{boardId}:
    get:
      summary: Obtener tablón
      description: Obtiene información detallada de un tablón específico
      tags:
        - boards
      parameters:
        - $ref: '#/components/parameters/PathBoardId'
      responses:
        '200':
          description: Detalles del tablón
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '404':
          $ref: '#/components/responses/NotFound'

  /boards/{boardId}/threads:
    get:
      summary: Listar hilos de un tablón
      description: Obtiene la lista de hilos activos en un tablón
      tags:
        - threads
      parameters:
        - $ref: '#/components/parameters/PathBoardId'
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QueryOffset'
        - name: page
          in: query
          description: Número de página a mostrar
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Lista de hilos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Thread'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Crear nuevo hilo
      description: Crea un nuevo hilo en el tablón especificado
      tags:
        - threads
      parameters:
        - $ref: '#/components/parameters/PathBoardId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ThreadCreate'
      responses:
        '201':
          description: Hilo creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /boards/{boardId}/catalog:
    get:
      summary: Obtener catálogo del tablón
      description: Obtiene una vista de catálogo con todos los hilos activos
      tags:
        - threads
      parameters:
        - $ref: '#/components/parameters/PathBoardId'
      responses:
        '200':
          description: Catálogo del tablón
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogThread'
                  meta:
                    type: object
                    properties:
                      threadCount:
                        type: integer
                        example: 200
        '404':
          $ref: '#/components/responses/NotFound'

  /boards/{boardId}/threads/{threadId}:
    get:
      summary: Obtener hilo completo
      description: Obtiene un hilo con todos sus posts
      tags:
        - threads
      parameters:
        - $ref: '#/components/parameters/PathBoardId'
        - $ref: '#/components/parameters/PathThreadId'
      responses:
        '200':
          description: Hilo completo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadWithPosts'
        '404':
          $ref: '#/components/responses/NotFound'

  /boards/{boardId}/threads/{threadId}/posts:
    post:
      summary: Responder a un hilo
      description: Crea un nuevo post en el hilo especificado
      tags:
        - posts
      parameters:
        - $ref: '#/components/parameters/PathBoardId'
        - $ref: '#/components/parameters/PathThreadId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        '201':
          description: Post creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /boards/{boardId}/posts/{postId}/report:
    post:
      summary: Reportar post
      description: Envía un reporte sobre un post
      tags:
        - moderation
      parameters:
        - $ref: '#/components/parameters/PathBoardId'
        - name: postId
          in: path
          description: ID del post
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreate'
      responses:
        '201':
          description: Reporte enviado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Report submitted successfully
                  reportId:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /captcha:
    get:
      summary: Obtener CAPTCHA
      description: Genera un nuevo CAPTCHA para verificación humana
      tags:
        - captcha
      responses:
        '200':
          description: CAPTCHA generado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Captcha'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /files/upload:
    post:
      summary: Subir archivo
      description: Sube un archivo al servidor para adjuntarlo a un post
      tags:
        - files
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Archivo subido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: Archivo demasiado grande
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      summary: Authenticate user
      description: Validates credentials and returns JWT access and refresh tokens.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                password:
                  type: string
                  minLength: 8
                  format: password
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/register:
    post:
      summary: Register new user
      description: Creates a new user account and returns authentication tokens.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - email
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  pattern: '^[a-zA-Z0-9_]+$'
                password:
                  type: string
                  minLength: 8
                  format: password
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      summary: Refresh access token
      description: Exchange a valid refresh token for a new access token.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Logout user
      description: Invalidates the current session and refresh token.
      tags:
        - auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /threads/{threadId}:
    get:
      summary: Get thread with posts
      description: Retrieves a thread and all its posts.
      tags:
        - threads
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thread with posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /threads/{threadId}/posts:
    post:
      summary: Create reply in thread
      description: Posts a reply to an existing thread.
      tags:
        - posts
      security:
        - BearerAuth: []
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  minLength: 1
                  maxLength: 10000
          multipart/form-data:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Banned or thread closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /posts/{postId}:
    get:
      summary: Get a single post
      description: Retrieves a post by its ID.
      tags:
        - posts
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'

  /files/{fileId}:
    get:
      summary: Get file metadata
      description: Returns metadata for an uploaded file.
      tags:
        - files
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '404':
          $ref: '#/components/responses/NotFound'

  /reports:
    post:
      summary: Report a post
      description: Submit a report for a post that violates rules.
      tags:
        - moderation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - postId
                - threadId
                - reason
              properties:
                postId:
                  type: string
                threadId:
                  type: string
                reason:
                  type: string
                  enum: [spam, illegal, harassment, off_topic, nsfw, other]
                description:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /mod/reports:
    get:
      summary: List reports
      description: View pending moderation reports. Requires moderator role.
      tags:
        - moderation
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, resolved, dismissed]
            default: pending
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QueryOffset'
      responses:
        '200':
          description: List of reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/Report'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mod/bans:
    post:
      summary: Ban a user
      description: Issue a ban against a user. Requires moderator role.
      tags:
        - moderation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - reason
                - duration
              properties:
                userId:
                  type: string
                reason:
                  type: string
                  maxLength: 500
                duration:
                  type: integer
                  description: Ban duration in seconds (0 = permanent)
                boardId:
                  type: string
                  nullable: true
                  description: Board-specific ban (null = global)
      responses:
        '201':
          description: Ban created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ban'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mod/bans/{userId}:
    delete:
      summary: Unban a user
      description: Remove an active ban. Requires moderator role.
      tags:
        - moderation
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                boardId:
                  type: string
                  nullable: true
      responses:
        '200':
          description: User unbanned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User unbanned successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /mod/log:
    get:
      summary: Get moderation log
      description: View the audit log of all moderation actions. Requires moderator role.
      tags:
        - moderation
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QueryOffset'
      responses:
        '200':
          description: Moderation action log
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModAction'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    GNAPAuth:
      type: http
      scheme: bearer
      bearerFormat: GNAP
      description: GNAP Access Token de autenticación
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication

  parameters:
    QueryLimit:
      name: limit
      in: query
      description: Número máximo de elementos a devolver
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    QueryOffset:
      name: offset
      in: query
      description: Número de elementos a saltar
      schema:
        type: integer
        minimum: 0
        default: 0

    PathBoardId:
      name: boardId
      in: path
      description: ID del tablón
      required: true
      schema:
        type: string

    PathThreadId:
      name: threadId
      in: path
      description: ID del hilo
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Solicitud invalida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: No autorizado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Prohibido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    TooManyRequests:
      description: Demasiadas solicitudes
      headers:
        Retry-After:
          schema:
            type: integer
          description: Segundos a esperar antes de reintentar
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required:
        - statusCode
        - message
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Bad Request
        error:
          type: string
          example: Invalid input
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    PaginationMeta:
      type: object
      properties:
        totalItems:
          type: integer
          example: 100
        itemCount:
          type: integer
          example: 20
        itemsPerPage:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 5
        currentPage:
          type: integer
          example: 1

    UserRegistration:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          example: moderator1
        email:
          type: string
          format: email
          example: mod@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: StrongPassword123!
        role:
          type: string
          enum: [USER, JANITOR, MODERATOR, ADMIN]
          default: USER
          example: MODERATOR

    UserLogin:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: moderator1
        password:
          type: string
          format: password
          example: StrongPassword123!

    GNAPGrantRequest:
      type: object
      required:
        - access_token
        - client
      properties:
        access_token:
          type: object
          required:
            - access
          properties:
            access:
              type: array
              items:
                $ref: '#/components/schemas/GNAPAccessRight'
        client:
          $ref: '#/components/schemas/GNAPClientInstance'
        user:
          type: object
          properties:
            sub_ids:
              type: array
              items:
                $ref: '#/components/schemas/GNAPSubjectID'
        interact:
          type: object
          properties:
            start:
              type: array
              items:
                type: string
                enum: [redirect, app, user_code]
            finish:
              type: object
              properties:
                method:
                  type: string
                  enum: [redirect, push]
                uri:
                  type: string
                  format: uri
                nonce:
                  type: string

    GNAPGrantResponse:
      type: object
      properties:
        continue:
          type: object
          properties:
            access_token:
              type: object
              properties:
