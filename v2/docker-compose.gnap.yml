version: '3.8'

services:
  gnap-server:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./gnap-mock:/usr/share/nginx/html
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

  go-service:
    build:
      context: ./api-core/services/go-service
    ports:
      - "8081:8080"
    environment:
      - GNAP_SERVER_URL=http://gnap-server:80
      - GNAP_CLIENT_KEY=test-client-key
      - GNAP_CLIENT_SECRET=test-client-secret
    depends_on:
      - gnap-server

  nodejs-service:
    build:
      context: ./api-core/services/nodejs-service
    ports:
      - "3000:3000"
    environment:
      - GNAP_SERVER_URL=http://gnap-server:80
      - GNAP_CLIENT_KEY=test-client-key
      - GNAP_CLIENT_SECRET=test-client-secret
    depends_on:
      - gnap-server

  media-processor:
    build:
      context: ./media-processor
    ports:
      - "8082:8080"
    environment:
      - GNAP_SERVER_URL=http://gnap-server:80
      - GNAP_CLIENT_KEY=test-client-key
      - GNAP_CLIENT_SECRET=test-client-secret
    depends_on:
      - gnap-server
